name: bench

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/bench.yml"
      - ".github/scripts/**"
  workflow_dispatch:
    inputs:
      base:
        description: "Base ref to compare against (default origin/main)."
        required: false
        type: string

permissions:
  contents: read

env:
  BENCH_COUNT: "6"
  BENCH_TIME: "1s"
  TIME_REGRESSION_THRESHOLD_PERCENT: "15"
  MEMORY_REGRESSION_THRESHOLD_PERCENT: "10"

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260409210113-8e83ce0f7b1c

      - name: Resolve base commit
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="$(git merge-base "${{ github.event.pull_request.base.sha }}" HEAD)"
          else
            base="$(git rev-parse "${{ inputs.base || 'origin/main' }}")"
          fi
          echo "sha=${base}" >> "$GITHUB_OUTPUT"

      - name: Benchmark head
        env:
          BENCH_FULL: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: bash .github/scripts/run-benchmarks.sh . | tee head.txt

      - name: Benchmark base
        shell: bash
        env:
          BENCH_FULL: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: |
          set -euo pipefail
          git worktree add ../base-checkout "${{ steps.base.outputs.sha }}"
          bash .github/scripts/run-benchmarks.sh ../base-checkout | tee base.txt

      - name: Compare against threshold
        run: bash .github/scripts/check-benchmarks.sh base.txt head.txt comparison.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: |
            base.txt
            head.txt
            comparison*.txt
          if-no-files-found: error
