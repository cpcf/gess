name: bench

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/bench.yml"
  workflow_dispatch:
    inputs:
      base:
        description: "Base ref to compare against (default origin/main)."
        required: false
        type: string

permissions:
  contents: read

env:
  BENCH_PATTERN: "BenchmarkSessionExplainLogRecording|BenchmarkSessionAssertNoExplainLog|BenchmarkGessSteadyStateRuleCreatedFacts$|BenchmarkGessNegationScalingSeedRun|BenchmarkClaimsTriageGessSessionCycle"
  BENCH_COUNT: "6"
  REGRESSION_THRESHOLD_PERCENT: "15"

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Resolve base commit
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="$(git merge-base "${{ github.event.pull_request.base.sha }}" HEAD)"
          else
            base="$(git rev-parse "${{ inputs.base || 'origin/main' }}")"
          fi
          echo "sha=${base}" >> "$GITHUB_OUTPUT"

      - name: Benchmark head
        run: go test ./internal/engine -run '^$' -bench "${BENCH_PATTERN}" -benchtime 1s -count "${BENCH_COUNT}" | tee head.txt

      - name: Benchmark base
        shell: bash
        run: |
          set -euo pipefail
          git worktree add ../base-checkout "${{ steps.base.outputs.sha }}"
          cd ../base-checkout
          go test ./internal/engine -run '^$' -bench "${BENCH_PATTERN}" -benchtime 1s -count "${BENCH_COUNT}" | tee "${GITHUB_WORKSPACE}/base.txt"

      - name: Compare against threshold
        shell: bash
        run: |
          set -euo pipefail
          benchstat -filter ".unit:sec/op" base.txt head.txt | tee comparison.txt
          awk -v threshold="${REGRESSION_THRESHOLD_PERCENT}" '
            /%/ {
              for (i = 1; i <= NF; i++) {
                if ($i ~ /^\+[0-9.]+%$/) {
                  v = $i
                  gsub(/[+%]/, "", v)
                  if (v + 0 > threshold) {
                    bad = 1
                    print "regression over " threshold "%: " $0
                  }
                }
              }
            }
            END { exit bad }
          ' comparison.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: |
            base.txt
            head.txt
            comparison.txt
          if-no-files-found: error
