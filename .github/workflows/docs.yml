name: docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "docs-site/**"
      - "rules/**"
      - "session/**"
      - "dsl/**"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "docs-site/**"
      - "rules/**"
      - "session/**"
      - "dsl/**"
      - ".github/workflows/docs.yml"

jobs:
  vale:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: vale-cli/vale-action@v2
        with:
          files: docs
          fail_on_error: "true"
          filter_mode: nofilter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs-site/package-lock.json
      - name: Install dependencies
        working-directory: docs-site
        run: npm ci
      - name: Build docs site
        working-directory: docs-site
        run: npm run build
      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-dist
          path: docs-site/dist
          retention-days: 7
      - name: Check internal links
        working-directory: docs-site
        run: |
          npx astro preview --port 4321 &
          npx wait-on http://localhost:4321/gess/
          # Skip github.com/pkg.go.dev: the repo is private until launch,
          # so those links 404 for an unauthenticated crawler even when
          # correct. Skip cpcf.github.io: the site's `site` config points
          # at its eventual production URL for canonical links and the
          # sitemap, which isn't live yet in this preview. Re-enable both
          # once the repo and the deployed site are public.
          npx linkinator http://localhost:4321/gess/ \
            --recurse \
            --check-fragments \
            --skip "github\.com" \
            --skip "pkg\.go\.dev" \
            --skip "cpcf\.github\.io"
