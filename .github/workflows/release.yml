name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create, for example v0.1.0."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate manual release version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          case "${RELEASE_VERSION}" in
            v*) ;;
            *)
              echo "Manual releases require a version starting with v, such as v0.1.0." >&2
              exit 1
              ;;
          esac

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_VERSION:-snapshot-${GITHUB_SHA:0:12}}"
          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )
          commands=(gess gessc gessfmt)

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"${target}"
            artifact="gess_${version}_${goos}_${goarch}"
            staging="dist/${artifact}"
            mkdir -p "${staging}"

            for command in "${commands[@]}"; do
              binary="${command}"
              if [[ "${goos}" == "windows" ]]; then
                binary="${command}.exe"
              fi

              GOOS="${goos}" GOARCH="${goarch}" go build \
                -trimpath \
                -ldflags="-s -w" \
                -o "${staging}/${binary}" \
                "./cmd/${command}"
            done

            cp README.md LICENSE "${staging}/"

            if [[ "${goos}" == "windows" ]]; then
              (cd dist && zip -qr "${artifact}.zip" "${artifact}")
            else
              tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
            fi

            rm -rf "${staging}"
          done

          (cd dist && sha256sum -- *.tar.gz *.zip > SHA256SUMS)

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gess-release-artifacts
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_VERSION}" dist/* --clobber
          else
            gh release create "${RELEASE_VERSION}" dist/* \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_VERSION}" \
              --generate-notes
          fi
